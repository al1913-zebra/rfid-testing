title: response
x-stoplight:
  id: 1uzw0wye4si2y
type: object
description: Standard response object containing the status code and description of the operation result.
properties:
  code:
    type: integer
    example: 0
    description: |-
      Response codes:

      | Code | Meaning |
      | --- | --- |
      | 0 | Success |
      | 1 | Command payload is accepted |
      | 2 | Invalid payload |
      | 3 | Not able to retrieve information |
      | 4 | Firmware update in progress |
      | 5 | Can't reboot device, inventory in progress |
      | 6 | Region is not configured |
      | 7 | Interface is not available |
      | 8 | Insufficient flash size |
      | 9 | File not found |
      | 10 | Configuration already exists |
      | 11 | Inventory in progress |
      | 12 | No Radio Operation in Progress |
      | 13 | Firmware update Failed |
      | 14 | Battery is low, Cannot update firmware |
      | 15 | WIFI Error - SSID not found |
      | 16 | WIFI Error - Cannot delete active SSID |
      | 17 | WIFI Error - SSID missed |
      | 18 | WIFI Error - SSID already exist |
      | 19 | WIFI Error - SSID count overflow |
      | 20 | Wifi is not supported |
      | 21 | Certificate not found |
      | 22 | Advanced configuration not set |
      | 23 | Invalid enum value |
      | 24 | Max 32 prefilters limit exceeded |
      | 25 | Max 3 publish topics exceeded |
      | 26 | Max 1 subscribe topic exceeded |
      | 27 | Invalid tenant ID length |
      | 28 | Tag match pattern length exceeded |
      | 29 | Url missing for HTTP source |
      | 30 | Certificate content missing for direct source |
      | 31 | Max write length exceeded |
      | 32 | Write data length mismatch |
      | 33 | Endpoint already configured |
      | 101 | Default error |
    minimum: 0
    maximum: 101
  description:
    type: string
    description: response description in detail
    example: Success
required:
  - code
  - description
