description: Heartbeat event periodically reporting device health, inventory, and connectivity status.
anyOf:
  - properties:
      inventoryStatus:
        type: object
        description: Current inventory scanning status and tag count.
        properties:
          status:
            type: string
            enum:
              - INPROGRESS
              - WAITING
              - STOPPED
            example: INPROGRESS
          tagsRed:
            type: integer
      scanStatus:
        type: object
        description: Current scan status and total scan count.
        properties:
          status:
            type: string
            enum:
              - INPROGRESS
              - STOPPED
            example: INPROGRESS
          scanCount:
            type: integer
            example: 120
      batteryStatus:
        type: object
        description: Current battery health, charge level, and charging status.
        properties:
          health:
            type: string
            example: good
          level:
            type: integer
            default: 92
          chargeStatus:
            type: integer
      userApps:
        type: array
        items:
          type: object
          description: Resource usage and status details for a single user application.
          properties:
            appName:
              type: string
            status:
              type: string
            cpu:
              type: string
            ram:
              type: string
            uptime:
              type: string
x-stoplight:
  id: knq4zksute27h
type: object
