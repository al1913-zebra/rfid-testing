title: gpi
type: object
description: Defines the GPI (General Purpose Input) port configuration.
properties:
  port:
    type: integer
    minimum: 1
    maximum: 2
    description: GPI Port Number
  signal:
    type: string
    enum:
      - HIGH
      - LOW
    description: Transition to this GPI will trigger event
  debounceTime:
    type: integer
    description: Time (in milliseconds) until GPI must remain at signal level to trigger event
    default: 0
required:
  - port
  - signal
examples:
  - port: 1
    signal: HIGH
    debounceTime: 0
