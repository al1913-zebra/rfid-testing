title: tagIdFilter
type: object
description: |-
  Represents filter on the tag id.

  If absent, no filter is used.
properties:
  value:
    type: string
    example: '[a-zA-Z0-9]{2,}'
    description: |-
      The value to match.


      For prefix and suffix filters. Only hex digits are allowed and there must be an even number of hex digits.

      When prefix filter is used, selects cannot be used. 

      For regex filter, C++ STL regex values should be used.
  match:
    type: string
    description: The segment or method of the id to match.
    enum:
      - prefix
      - suffix
      - regex
    example: regex
  operation:
    type: string
    default: include
    enum:
      - include
      - exclude
    example: include
    description: The filter operation (include/exclude).
required:
  - value
  - match
  - operation
