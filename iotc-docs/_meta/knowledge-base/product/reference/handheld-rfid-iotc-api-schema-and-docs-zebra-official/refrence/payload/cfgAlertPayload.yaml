title: alertConfiguration
x-stoplight:
  id: 10vb0ludr8vsa
type: object
description: Defines the alert configuration thresholds for device monitoring events.
properties:
  cpuUsage:
    type: object
    description: Configuration for CPU usage alerts, including the threshold and enabled status.
    properties:
      treshold:
        type: number
        description: 'maximum CPU usage %, if cpu usage is more than the threshold value then cpu alert will be sent out'
        minimum: 20
        maximum: 100
      status:
        type: boolean
        description: |-
          true - cpu alert enabled
          false - cpu alert disabled
        default: false
    required:
      - treshold
      - status
  ramUsage:
    type: object
    description: Configuration for RAM usage alerts, including the threshold and enabled status.
    properties:
      treshold:
        type: number
        description: 'maximum RAM usage , if RAM usage is more than the hreshold value then ramUsage alert will be sent out'
        minimum: 50
        maximum: 100
      status:
        type: boolean
        description: |-
          true - ram alert enabled 
          false - ram alert disabled
        default: false
    required:
      - treshold
      - status
  flashUsage:
    type: object
    description: Configuration for flash storage usage alerts, including the threshold and enabled status.
    properties:
      treshold:
        type: number
        description: 'maximum Flash usage limit, if flash usage is more than the threshold value then flashUsage alert will be sent out'
        minimum: 40
        maximum: 100
      status:
        type: boolean
        description: |-
          true - flashUsage alert enabled
          false - flashUsage alert disabled
        default: false
    required:
      - treshold
      - status
  temperature:
    type: object
    description: Configuration for temperature alerts, including the threshold and enabled status.
    properties:
      treshold:
        type: number
        description: 'maximum temperature  limit, if temperature is more than the threshold value then temperature alert will be sent out'
        minimum: 50
        maximum: 100
      status:
        type: boolean
        description: |-
          true - temperature alert enabled
          false - temperature alert disabled        
        default: false
    required:
      - treshold
      - status
