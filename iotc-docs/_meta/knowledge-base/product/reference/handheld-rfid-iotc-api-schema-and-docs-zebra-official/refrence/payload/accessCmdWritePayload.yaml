title: write
type: object
description: Defines the write command payload used to write data to a specific memory bank of an RFID tag.
examples:
  - type: WRITE
    config:
      memoryBank: EPC
      offset: 0
      data: '11112222'
      length: 0
properties:
  config:
    type: object
    description: Write operation parameters specifying the target memory bank, offset, data, and length.
    required:
    properties:
      memoryBank:
        type: string
        enum:
          - EPC
          - TID
          - USER
          - RESERVED
        description: Membank Field (see EPC Gen2 Spec)
      offset:
        type: integer
        description: Memory bank offset Field in words (see EPC Gen2 Spec)
      data:
        type: string
        description: 'Data Field (see EPC Gen2 Spec) Hex string indicating the word(s) to be written. Unlike the Gen2 Spec, the length of the data field can be more than a single 16 bit word. However, the length of the string must be a multiple of 16 bit words'
        example: '11112222'
      length:
        type: integer
        description: 'If set to non-zero value, the reader will use the BlockWrite command set write the data (and not the simple Write command). The value indicates the number of 16-bit words to use for each block'
required:
  - config
