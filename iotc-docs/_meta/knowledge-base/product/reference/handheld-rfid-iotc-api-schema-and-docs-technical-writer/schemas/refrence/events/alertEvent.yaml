              reach:
                type: number
          cpuUsage:
            type: number
          flashUsage:
            type: number
          ramUsage:
            type: number
          userApp:
            type: object
            properties:
              appName:
                type: string
              message:
                type: string
          temperature:
            type: object
            properties:
              nge:
                type: number
